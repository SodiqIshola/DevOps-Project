# -----------------------------------------------------------------------------
# POD DISRUPTION BUDGET (PDB)
# Purpose: High availability safeguard during cluster maintenance.
# -----------------------------------------------------------------------------
apiVersion: policy/v1               # API version for high-availability policies
kind: PodDisruptionBudget           # Defines this as a "safety net" for Pod uptime
metadata:
  name: node-app-pdb                # Unique name for this availability rule
  namespace: app                     # CRITICAL: Must be in the same folder as the Pods
spec:
  minAvailable: 50%                 # Dynamic Rule: Ensures half your Pods stay alive
  selector:
    matchLabels:
      app: node-app                 # Target: Applies this rule to Pods labeled "node-app"

# -----------------------------------------------------------------------------
# PDB vs. TERMINATION GRACE PERIOD:
# 1. PDB (The "Building Permit"): This is cluster-wide planning. It prevents 
#    admins from deleting too many Pods at once during updates. Using "50%" 
#    means if you scale to 10 replicas, 5 must always stay online.
#
# 2. Termination Grace Period (The "Exit Notice"): This is about a single 
#    Pod's internal shutdown. Once the PDB allows a Pod to be killed, this 
#    gives Node.js 30 seconds to finish its work before the power is cut.
#
# Summary: PDB decides *if* a Pod is allowed to stop; Grace Period decides 
# *how* it stops once the green light is given.
# -----------------------------------------------------------------------------
