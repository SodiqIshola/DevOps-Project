
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nodejs-app-appset
  namespace: argocd
spec:
  # ============================================================================
  # GO TEMPLATE SUPPORT
  # ============================================================================
  # Enables advanced templating ({{ }}) to dynamically inject variables from 
  # the generators into the Application definitions below.
  # ============================================================================
  goTemplate: true

  # ============================================================================
  # GENERATORS SECTION
  # ============================================================================
  # This section defines the "Discovery" logic. It tells ArgoCD where to look 
  # for code and what metadata (namespaces, projects) to associate with each 
  # environment. The Matrix generator merges Git folders with our custom list.
  # ============================================================================
  generators:
    - matrix:
        generators:
          # Scans the Git repository for environment-specific overlay folders
          - git:
              repoURL: https://github.com/SodiqIshola/DevOps-Project
              revision: main
              directories:
                - path: k8s/apps/nodejs-app/platform/aws/*
          
          # Defines a configuration map to link folder names to specific K8s settings
          - list:
              elements:
              # NOTE: 'envName' must match the folder name in your Git path exactly
                - envName: dev
                  project: dev-apps-project
                  namespace: dev-namespace
                  autoSync: true 
                - envName: prod
                  project: prod-apps-project
                  namespace: prod-namespace
                  autoSync: false
        
        # This matches the folder name (path.basename) to the list entry (envName)
        selector:
          matchLabels:
            envName: "{{path.basename}}"

  # ============================================================================
  # TEMPLATE SECTION
  # ============================================================================
  # This section is responsible for the automation of child applications. 
  # It acts as a blueprint: for every environment identified by the generators, 
  # this section generates a corresponding ArgoCD Application resource.
  # ============================================================================
  template:
    metadata:
      # Creates unique app names like: nodejs-app-development
      name: nodejs-app-{{path.basename}}
      labels:
        env: "{{envName}}"
        managed-by: argocd
    spec:
      # Uses the 'project' variable from the lookup table for RBAC security
      project: "{{project}}"
      
      source:
        repoURL: https://github.com
        targetRevision: main
        path: "{{path}}"
      
      destination:
        server: https://default.svc
        # Routes the deployment to the specific environment namespace
        namespace: "{{namespace}}"
      
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

  # ============================================================================
  # DYNAMIC SYNC OVERRIDE
  # ============================================================================
  # This patch applies automated sync (Prune/Self-Heal) only to environments 
  # where 'autoSync' is set to true in the generator list (e.g., Development).
  # ============================================================================
  templatePatch: |
    {{- if .autoSync }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
    {{- end }}

        