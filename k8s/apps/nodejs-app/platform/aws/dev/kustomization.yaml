# platform/aws/dev/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../overlays/development

components:
  - ../../../components/gp3-storage
  - ../../../components/aws-alb-ingress
  - ../../../components/aws-alb-networkpolicy

patches:
  - target:
      kind: Ingress
      name: node-app-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/http/paths/0/path
        value: /node-app-dev

  - target:
      kind: Ingress
      name: node-app-ingress
    patch: |-
      - op: add
        path: /metadata/annotations/alb.ingress.kubernetes.io~1transforms.node-app-service-dev
        value: >
          [
            {
              "Type": "url-rewrite",
              "UrlRewriteConfig": {
                "Rewrites": [
                  {
                    "Regex": "^/node-app-dev/?(.*)$",
                    "Replace": "/${1}"
                  }
                ]
              }
            }
          ]