
# platform/aws/prod/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../overlays/production

components:
  - ../../../components/gp3-storage
  - ../../../components/aws-alb-ingress
  - ../../../components/aws-alb-networkpolicy

replacements:
  - source:
      kind: Deployment
      name: node-app
      fieldPath: metadata.name
    targets:
      - select:
          kind: Ingress
          name: node-app-ingress
        fieldPaths: 
          - spec.rules.0.http.paths.0.path
        options:
          delimiter: "/"
          index: 1 

patches:
  - target:
      kind: Ingress
      name: node-app-ingress
    patch: |-
      - op: add
        path: /metadata/annotations/alb.ingress.kubernetes.io~1transforms.default
        value: |
          {
            "Type": "url-rewrite",
            "UrlRewriteConfig": {
              "Rewrites": [
                { "Regex": "^/node-app-prod/(.*)$", "Replace": "/${1}" },
                { "Regex": "^/node-app-prod$", "Replace": "/" }
              ]
            }
          }




