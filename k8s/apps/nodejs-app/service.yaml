# -----------------------------------------------------------------------------
# SERVICE (SERVICE.YAML)
# Importance: Pods are "mortal" and their IPs change constantly. This Service 
# acts as a "Stable Front Door," providing a permanent entry point that 
# tracks your Pods so users stay connected even when Pods restart or scale.
# -----------------------------------------------------------------------------
apiVersion: v1                      # API version for Service resources
kind: Service                       # Defines this as a Service object
metadata:
  name: node-app-service            # The permanent name used to find your app
  namespace: app                    # The "Front Door" is now inside the 'app' folder
spec:
  selector:
    app: node-app                   # Routing: Sends traffic to any Pod labeled "node-app"
  ports:
    - protocol: TCP                 # Uses standard Transmission Control Protocol
      port: 80                      # External Port: What users type (e.g., http://app)
      targetPort: 3000              # Internal Port: The port your Node app listens on
      nodePort: 32000               # Backdoor: The specific port opened on every server node
  type: NodePort                    # Strategy: Opens a port on the server's IP for external access

# -----------------------------------------------------------------------------
# UNDERSTANDING SERVICE TYPES:
# 1. ClusterIP (Default): Internal only. Keeps apps/databases hidden from the
#    public internet, accessible only by other services inside the cluster.
#
# 2. NodePort (Backdoor): Opens a port on every server (Node) IP. It's the 
#    simplest way to allow external traffic without a cloud-provider setup.
#
# 3. LoadBalancer (Gold Standard): For cloud environments (AWS/Azure/GCP). 
#    It creates a professional, single public IP to handle heavy traffic.
#
# 4. ExternalName (Redirect): Acts like a "shortcut" or alias to a service 
#    that lives outside of your Kubernetes cluster.
# -----------------------------------------------------------------------------
