# -----------------------------------------------------------------------------
# HORIZONTAL POD AUTOSCALER (HPA)
# Purpose: Automatically scales the number of Pods up or down based on load.
# Importance: This is the "Cruise Control" for your app. Instead of manually 
# changing replicas, Kubernetes monitors your app's CPU usage. If your app 
# gets a sudden spike in traffic (like a sale or a viral post), the HPA 
# detects the high CPU and "spawns" more Pods to share the workload. 
# Once the traffic dies down, it "shrinks" the app back to save resources.
# -----------------------------------------------------------------------------
apiVersion: autoscaling/v2           # Modern API version for scaling rules
kind: HorizontalPodAutoscaler        # Defines this as an "Auto-Scaling" engine
metadata:
  name: node-app-hpa                 # Unique name for this scaling rule
  namespace: app                     # CRITICAL: Must be in the same namespace as the Deployment
spec:
  scaleTargetRef:                    # The target: What are we actually scaling?
    apiVersion: apps/v1              # The target's API version
    kind: Deployment                 # We are scaling a Deployment
    name: node-app                   # Must match the name in your Deployment.yaml
  minReplicas: 2                     # Floor: Never drop below 2 Pods (High Availability)
  maxReplicas: 4                     # Ceiling: Never create more than 4 Pods (Budget Control)
  metrics:                           # The "Trigger": What causes a scale event?
  - type: Resource                   # Monitoring a system resource
    resource:
      name: cpu                      # Specifically watching CPU usage
      target:
        type: Utilization            # Based on a percentage of your "Request"
        averageUtilization: 50       # Trigger: If average CPU > 50%, add a Pod

# -----------------------------------------------------------------------------
# NOTE: IMPORTANT TECHNICAL REQUIREMENT
# For this to work on your personal system, you must have the "Metrics Server" 
# installed in your cluster. Kubernetes cannot "see" how much CPU or RAM a 
# Pod is using without it. If the HPA shows <unknown> for usage, it means 
# the Metrics Server is missing or not configured correctly.
# -----------------------------------------------------------------------------
