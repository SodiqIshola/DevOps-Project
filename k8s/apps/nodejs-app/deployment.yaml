# -----------------------------------------------------------------------------
# DEPLOYMENT
# Purpose: Manages the lifecycle of your application pods (updates, scaling).
# Includes Resource Quotas & Security settings .
# -----------------------------------------------------------------------------
apiVersion: apps/v1                  # API version for Deployment resources
kind: Deployment                     # Defines this as a Deployment controller
metadata:
  name: node-app                     # Unique name for this deployment
  namespace: app                     # Ensures the Pods run inside the 'app' folder
  labels:
    app: node-app                    # Key-value pair for organizing/searching
spec:
  replicas: 2                        # Maintains 2 running copies of your app
  selector:
    matchLabels:
      app: node-app                  # Tells deployment which Pods belong to it
  template:                          # Blueprint for the Pods to be created
    metadata:
      labels:
        app: node-app                # Labels applied to the Pods
    spec:
      # SECURITY: DISABLE AUTOMOUNTING SERVICE ACCOUNT TOKEN
      # Disabling this prevents an API token from being injected into the pod.
      # This satisfies security best practices for apps that don't manage the cluster.
      automountServiceAccountToken: false 
      
      # When a Pod is marked for deletion, Kubernetes sends a SIGTERM signal that
      # Gives Node.js 30s to finish DB queries/logs (SIGTERM) before a forced shutdown (SIGKILL).
      terminationGracePeriodSeconds: 30 
      containers:
      - name: node-app               # Name of the container inside the Pod
        image: sunky24/node-task-app:1.3.0 # The Docker image to run
        imagePullPolicy: Always      # Pulls the image every time a Pod starts
        ports:
        - containerPort: 3000        # The port the application uses
        env:
        - name: TZ
          value: "America/Toronto"   # Sets the container timezone

        # RESOURCE MANAGEMENT 
        # ephemeral-storage refers to local disk space (logs, temp files).
        # Requests: Guaranteed space. Limits: Maximum space allowed before eviction.
        resources:
          requests:                       # Minimum resources guaranteed to the container
            cpu: "250m"                   # Reserves 0.25 CPU cores
            memory: "256Mi"               # Reserves 256MB of RAM
            ephemeral-storage: "500Mi"    # Reserves 500MB of local disk space

          limits:                         # Maximum resources the container can ever use
            cpu: "500m"                   # Hard limit: prevents container from hogging CPU
            memory: "512Mi"               # Hard limit: kills container if it leaks RAM
            ephemeral-storage: "1Gi"      # Hard limit: prevents pod from filling the node's disk

        # PROBES: Monitoring application health
        # The Guard: Runs first to allow the app a "warm-up" period. It keeps
        # other probes disabled until the app is fully booted, then turns 
        # itself off once the app is successfully running.
        startupProbe:                # Initial check: allows app time to boot up
          httpGet:
            path: /                  # URL path to ping
            port: 3000               # Port to ping
          failureThreshold: 30       # Number of attempts before giving up
          periodSeconds: 10          # Gap between attempts (Total 300s window)
        
        # The Doctor: Runs continuously to detect "deadlocks." If the app 
        # stops responding, Kubernetes kills and restarts the container 
        # to restore healthy service automatically.
        livenessProbe:               # Ongoing check: restarts container if it freezes
          httpGet:
            path: /
            port: 3000
          periodSeconds: 20          # Checks every 20 seconds
          
        # Traffic Cop: If the app is busy or overwhelmed, this probe fails. 
        # Kubernetes stops sending traffic to the Pod but keeps it running, 
        # resuming only when the app is ready to handle requests again.
        readinessProbe:              # Traffic check: stops user traffic if app is busy
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5     # Wait time before first check after startup

        volumeMounts:                # Attaches the storage to a specific folder
        - name: log-storage          # Must match the volume name below
          mountPath: /app/logs       # The path inside the Linux container

      volumes:                       # Definition of the storage source
      - name: log-storage            # Reference name for the volume mount
        persistentVolumeClaim:
          claimName: node-app-log-pvc # Points to the PVC created in your other file

