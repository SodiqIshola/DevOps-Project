# -----------------------------------------------------------------------------
# RESOURCE QUOTA (The Namespace Budget)
# Purpose: Sets a hard limit on the total resources consumed by one namespace.
# Importance: Without this, a developer could accidentally set 'replicas: 100' 
# and eat up all the CPU on every server in the cluster. This "Guardrail" 
# ensures the 'app' namespace plays fair with other namespaces (like 'monitoring').
# -----------------------------------------------------------------------------
apiVersion: v1                      # Standard API for core resource limits
kind: ResourceQuota                 # Defines this as a "Budgeting" object
metadata:
  name: app-namespace-quota         # Unique name for this budget
  namespace: app                     # Target: Applies only to the 'app' folder
spec:
  hard:                              # The "Hard Ceiling" limits:
    requests.cpu: "2"                # Total guaranteed CPU across all Pods
    requests.memory: "2Gi"           # Total guaranteed RAM across all Pods
    limits.cpu: "4"                  # Absolute max CPU the namespace can touch
    limits.memory: "4Gi"             # Absolute max RAM the namespace can touch
    pods: "10"                       # Maximum number of Pods allowed in this folder
    persistentvolumeclaims: "5"      # Maximum number of disk requests allowed
