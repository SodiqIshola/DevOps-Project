# -----------------------------------------------------------------------------
# NETWORK POLICY
# Enforces strict ingress control, allowing only Traefik and NodePort traffic.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: node-app-allow-ingress
spec:
  podSelector:
    matchLabels:
      app: node-app
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: http