# -----------------------------------------------------------------------------
# SERVICE MONITOR
# Integrates with Prometheus for metrics collection using Service reference.
# -----------------------------------------------------------------------------
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: node-app-monitor
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: node-app
  namespaceSelector:
    matchNames:
      - app
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
    scheme: http