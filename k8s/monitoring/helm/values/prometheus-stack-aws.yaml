# prometheus-stack-aws.yaml
prometheus:
  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      kubernetes.io/ingress.class: "alb"

      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/group.name: platform
      alb.ingress.kubernetes.io/wafv2-acl-arn: "${waf_arn}"
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

    hosts:
      - "" 
    paths: 
      - /prometheus
      - /prometheus/*

  prometheusSpec:
    externalUrl: "/prometheus/"
    routePrefix: /prometheus

    containers:
      - name: prometheus
        startupProbe:
          httpGet:
            path: /prometheus/-/ready
            port: http-web
          failureThreshold: 30
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /prometheus/-/healthy
            port: http-web
          periodSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /prometheus/-/ready
            port: http-web
          periodSeconds: 10
          failureThreshold: 3

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

grafana:
  persistence:
    enabled: true
    storageClassName: gp3
    type: pvc
    size: 2Gi
    finalizers: ["kubernetes.io/pvc-protection"]
  
  initChownData:
    enabled: true

  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      kubernetes.io/ingress.class: "alb"

      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/group.name: platform
      alb.ingress.kubernetes.io/wafv2-acl-arn: "${waf_arn}"
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

    hosts:
      - ""
    path: /grafana
    # Some chart versions require 'extraPaths' for the wildcard
    extraPaths:
      - path: /grafana/*
        pathType: Prefix
        backend:
          service:
            name: kube-prometheus-stack-grafana
            port:
              number: 80

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      serve_from_sub_path: true
    auth.anonymous:
      enabled: false

