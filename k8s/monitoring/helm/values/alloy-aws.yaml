# alloy-aws.yaml
# Combined patch to fix the crash and handle ALB sub-paths

ingress:
  enabled: true
  # Grafana Faro allows Alloy to ingest frontend telemetry (JS errors, etc.)
  faroPort: 12345 
  ingressClassName: alb
  annotations:
    kubernetes.io/ingress.class: "alb"

    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: platform
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

    # Health check points to the Alloy UI port
    alb.ingress.kubernetes.io/healthcheck-port: '12345'
    alb.ingress.kubernetes.io/healthcheck-path: /-/ready
    alb.ingress.kubernetes.io/success-codes: '200'

  hosts:
  - ""

  path: /alloy
  pathType: Prefix


alloy:
  extraArgs:
    - --server.http.ui-path-prefix=/alloy
    - --stability.level=generally-available
  
  # Ensure the service port matches what the Ingress expects (12345)
  extraPorts:
    - name: "metrics"
      port: 12345
      targetPort: 12345
      protocol: "TCP"

  