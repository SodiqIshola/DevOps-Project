# alloy-aws.yaml
# Combined patch to fix the crash and handle ALB sub-paths


ingress:
  enabled: true
  ingressClassName: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: platform
    alb.ingress.kubernetes.io/wafv2-acl-arn: "${waf_arn}"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
  # Corrected for Alloy Helm Chart templates
  hosts:
    - "" 
  extraPaths:
    - path: /alloy
      pathType: Prefix
      backend:
        service:
          name: alloy
          port:
            number: 12345
    - path: /alloy/*
      pathType: Prefix
      backend:
        service:
          name: alloy
          port:
            number: 12345

alloy:
  extraArgs:
    - "--server.http.ui-path-prefix=/alloy"
    - "--storage.path=/var/lib/alloy/data"
    - "--stability.level=generally-available"
  
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    runAsNonRoot: false

controller:
  type: daemonset

  # --- STORAGE CORRECTED FOR DAEMONSET ---
  persistence:
    enabled: true
    accessModes: ["ReadWriteOnce"]
    size: 2Gi
    storageClass: gp3
