# alloy-aws.yaml
# Combined patch to fix the crash and handle ALB sub-paths

ingress:
  enabled: true
  ingressClassName: alb
  annotations:
    kubernetes.io/ingress.class: "alb"

    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: platform
    alb.ingress.kubernetes.io/wafv2-acl-arn: "${waf_arn}"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

    # Required for ALB to see the pod as healthy
    alb.ingress.kubernetes.io/healthcheck-port: '12345'
    alb.ingress.kubernetes.io/healthcheck-path: /-/ready
    alb.ingress.kubernetes.io/success-codes: '200'
  
  hosts:
    - host: ""
      paths:
        - path: /alloy
          pathType: Prefix

alloy:
  extraArgs:

    # This ensures Alloy links work correctly when hosted at /alloy
    - --server.http.ui-path-prefix=/alloy
    - --storage.path=/var/lib/alloy/data
    - --stability.level=generally-available
  
  # Ensure the service port matches what the Ingress expects (12345)
  extraPorts:
    - name: "metrics"
      port: 12345
      targetPort: 12345
      protocol: "TCP"

  