# https://github.com/grafana/helm-charts/blob/main/charts/tempo-distributed/values.yaml

# =============================================================================
# GRAFANA TEMPO (TRACE STORAGE)
# =============================================================================
# Role:
# - Stores distributed traces
# - Provides query backend for Grafana
# - Generates optional metrics via metrics_generator
#
# Storage: Local (dev/test). Use S3/GCS in production.
# =============================================================================

metricsGenerator:
  enabled: true

image:
  repository: grafana/tempo
  tag: 2.10.1
  pullPolicy: IfNotPresent

replicaCount: 1

# ------------------------
# RESOURCE LIMITS
# ------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

 
# ------------------------
# SECURITY CONTEXT
# ------------------------
podSecurityContext:
  fsGroup: 10001

# ------------------------
# HEALTH CHECKS (WAL RECOVERY)
# ------------------------
startupProbe:
  httpGet:
    path: /ready
    port: 3200
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 120  
  periodSeconds: 10
  failureThreshold: 10   

readinessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 30   
  periodSeconds: 10


# ------------------------
# CORE CONFIGURATION
# ------------------------
config: |
  multitenancy_enabled: false

  server:
    http_listen_port: 3200

  distributor:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

  ingester:
    max_block_duration: 5m
    lifecycler:
      ring:
        kvstore:
          store: inmemory

  compactor:
    compaction:
      block_retention: 48h

  storage:
    trace:
      backend: local
      block:
        version: vParquet4
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  overrides:
    defaults:
      metrics_generator:
        processors:
          - service-graphs
          - local-blocks

  metrics_generator:
    storage:
      path: /var/tempo/generator/wal
      remote_write:
        - url: "http://prometheus-operated.monitoring.svc:9090/api/v1/write"

    traces_storage:
      path: /var/tempo/generator/traces 

    processor:
      local_blocks:
        flush_to_storage: true
      service_graphs:
        dimensions:
          - deployment.environment
          - k8s.namespace.name


# ------------------------
# PROMETHEUS METRICS SCRAPING
# ------------------------
metrics:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 30s
  endpoints:
    - port: tempo-prom-metrics
      path: /metrics
  additionalLabels:
    release: kube-prometheus-stack

# ------------------------
# PERSISTENCE
# ------------------------
persistence:
  enabled: true
  storageClass: local-path
  size: 2Gi
  accessModes:
    - ReadWriteOnce


networkPolicy:
  enabled: true
  # Applies this to the tempo Pods
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: tempo
      app.kubernetes.io/name: tempo
  # Explicitly define the types of traffic this policy controls
  policyTypes:
  - Ingress
  ingress:
  - from:
    # This allows traffic FROM any pod with the alloy label
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: alloy
    ports:
    - protocol: TCP
      port: 4317 # OTLP gRPC
    - protocol: TCP
      port: 4318 # OTLP HTTP
    - protocol: TCP
      port: 3200 # Tempo HTTP (for health checks/metrics)
  




