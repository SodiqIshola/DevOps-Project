# loki-aws.yaml
deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    accessModes: ["ReadWriteOnce"]
    size: 2Gi
    storageClass: gp3

gateway:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: alb
    annotations:

      kubernetes.io/ingress.class: "alb"
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/group.name: platform
      alb.ingress.kubernetes.io/wafv2-acl-arn: "arn:aws:wafv2:ca-central-1:649999313359:regional/webacl/my-eks-cluster-waf-waf/6f58b0ad-ddbc-4f25-be99-77aab4f978d6"
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
      alb.ingress.kubernetes.io/load-balancer-attributes: "idle_timeout.timeout_seconds=600"
      
      # --- AWS ALB HEALTH CHECK CONFIGURATION ---
      # Loki gateway typically uses port 8080 for traffic and health checks
      alb.ingress.kubernetes.io/healthcheck-port: '8080'
      alb.ingress.kubernetes.io/healthcheck-path: /    # The gateway root returns 200 OK
      alb.ingress.kubernetes.io/success-codes: '200'

    hosts:
      - host: ""
        paths:
          - path: /loki
            pathType: Prefix

  # --- ALIGN PROBES WITH GATEWAY NGINX PORT ---
  startupProbe:
    httpGet:
      path: /
      port: 8080  
    failureThreshold: 15
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /
      port: 8080
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /
      port: 8080
    periodSeconds: 10


