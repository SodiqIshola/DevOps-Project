
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-monitoring-assets
  namespace: argocd
  annotations:
    # Sync Wave 1: Deploying ConfigMaps/Secrets first!
    # This ensures the '.alloy' config file exists before the Alloy pods start.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: observability-project
  source:
    repoURL: https://github.com/SodiqIshola/DevOps-Project
    targetRevision: HEAD
    # Path to the folder containing the kustomization.yaml above
    path: k8s/monitoring 
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
