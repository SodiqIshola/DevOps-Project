
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Deployment name for the Alloy collector
  name: alloy
  # Namespace where Argo CD is running
  namespace: argocd
  annotations:
    # Sync Wave 2: This ensures Alloy only starts after Wave 1 (the ConfigMaps/Assets) 
    # is fully deployed and healthy, preventing "config not found" startup crashes.
    argocd.argoproj.io/sync-wave: "2"
spec:
  # Uses the 'observability-project' for RBAC permissions instead of 'default'
  project: observability-project
  
  sources:
    # Source 1: Pulls the official Helm chart from Grafana's repository
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.6.2
      helm:
        # Refers to the '$config' alias defined in the second source below
        valueFiles:
          - $config/k8s/monitoring/helm/values/alloy.yaml
    
    # Source 2: Pulls your custom configuration/values from your Git repository
    - repoURL: https://github.com/SodiqIshola/DevOps-Project
      targetRevision: HEAD
      # Alias used by the Helm source to locate the values file
      ref: config 

  destination:
    # Target cluster and namespace for the Alloy pods
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      # Automatically removes orphaned resources
      prune: true
      # Automatically corrects manual changes to match the Git state
      selfHeal: true
    syncOptions:
      # Ensures the 'monitoring' namespace exists before deployment
      - CreateNamespace=true
    retry:
      # Retries deployment if it fails due to transient network or API errors
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
