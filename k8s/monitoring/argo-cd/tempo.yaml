
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    # Sync Wave 2: Deploys before Alloy (Wave 2) so the tracing backend is ready first
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: observability-project
  # Multiple sources allow combining the official Helm chart with local Git values
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: tempo
      targetRevision: 1.24.4 # Specific chart version to prevent breaking changes on auto-update
      helm:
        valueFiles:
          # $values refers to the 'ref: values' defined in the second source below
          - $values/k8s/monitoring/helm/values/tempo.yaml

    - repoURL: https://github.com/SodiqIshola/DevOps-Project
      targetRevision: HEAD
      ref: values 

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring # Deployment target namespace
  syncPolicy:
    automated:
      prune: true      # Automatically deletes resources removed from Git
      selfHeal: true   # Reverts manual 'kubectl' changes to match Git state
    syncOptions:
      - CreateNamespace=true # Ensures 'monitoring' exists before deployment
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m # Progressive wait time if the initial deployment fails
