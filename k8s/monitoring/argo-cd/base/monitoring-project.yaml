apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability-project
  namespace: argocd

  labels:
    stack: observability
    component: rbac-project
    scope: cross-environment
    app.kubernetes.io/component: administrative-policy
    app.kubernetes.io/part-of: monitoring-stack
    managed-by: argocd

spec:
  description: "RBAC boundary for observability stack deployments (Prometheus, Loki, Tempo, OpenTelemetry, Alloy) into the monitoring namespace"
  

  # Note: Root and Child Application resources live in the 'argocd' namespace. 
  # Both 'argocd' (for Apps) and 'monitoring' (for resources) must be allowed destinations.
  destinations:
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: argocd 
      server: https://kubernetes.default.svc
  
  # Approved source repositories for Helm charts and internal manifests
  sourceRepos:
    - "https://prometheus-community.github.io/helm-charts"
    - "https://grafana.github.io/helm-charts"
    - "https://open-telemetry.github.io/opentelemetry-helm-charts"
    - "https://grafana-community.github.io/helm-charts"
    - "https://github.com/SodiqIshola/DevOps-Project"

  # Allows required cluster-scoped resources (e.g., CRDs, ClusterRoles) for observability components
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'


