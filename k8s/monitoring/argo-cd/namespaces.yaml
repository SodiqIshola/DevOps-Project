
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Unique name for this Argo CD application (Environment specific)
  name: cluster-namespaces
  # The namespace where Argo CD controller is running
  namespace: argocd 
  annotations:
    # Sync Wave -1: Ensures this installs first before prometheus-stack
    argocd.argoproj.io/sync-wave: "-1"
spec:
  # Uses the 'observability-project' for RBAC permissions instead of 'default'
  project: observability-project
  
  source:
    repoURL: https://github.com/SodiqIshola/DevOps-Project
    # The branch, tag, or commit hash to sync from (HEAD = latest)
    targetRevision: HEAD
    path: k8s/namespaces 
  
  destination:
    # The API server URL of the target cluster (default.svc is the local cluster)
    server: https://kubernetes.default.svc
    # Leave empty because namespace YAML will create its own namespaces
    namespace: "" 

  syncPolicy:
    automated:
      # Deletes resources from the cluster that are no longer in Git
      prune: true
      # Automatically syncs the cluster back to Git state if someone changes it manually
      selfHeal: true
    syncOptions:
      # Creates the destination namespace automatically if it doesn't exist
      - CreateNamespace=true
    
    # Retry logic to handle intermittent failures (like the network timeouts we saw earlier)
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
