
# Patch for Prometheus Stack
# overlays/aws/ingress-patch.yaml (Updated)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd  
spec:
  sources:
    # Source : The remote Helm Chart
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 82.10.3
      helm:
        valueFiles:
          - $config/k8s/monitoring/helm/values/prometheus-stack.yaml
          - $config/k8s/monitoring/helm/values/prometheus-stack-aws.yaml


