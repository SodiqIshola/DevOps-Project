
# yaml-language-server: $schema=none
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  # This Application resource lives in the Argo CD namespace to be managed by the controller
  namespace: argocd
  annotations:
    # Sync Wave 2: Deploys Loki alongside Tempo, but after foundational layers (Wave 0)
    # ensuring the logging backend is ready before Alloy (Wave 2) starts sending data.
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: observability-project
  sources:
    # Source 1: Pulls the official Helm Chart logic from the Grafana community
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.55.0 # Pins the chart version to ensure reproducible deployments
      helm:
        # Multiple sources pattern: references the configuration file from the Git repo below
        # '$values' is a placeholder that maps to the 'ref: values' identifier
        valueFiles:
          - $values/k8s/monitoring/helm/values/loki.yaml
    
    # Source 2: The Git repository acting as the "Source of Truth" for your custom settings
    - repoURL: https://github.com/SodiqIshola/DevOps-Project 
      targetRevision: HEAD # Tracks the latest commit on the default branch
      ref: values # Arbitrary name used as an alias for Helm value mapping above

  destination:
    # Deploys to the local cluster where Argo CD is installed
    server: https://kubernetes.default.svc
    # The target namespace for the actual Loki pods and services
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true      # Garbage collection: deletes resources no longer defined in Git
      selfHeal: true   # Configuration drift protection: overrides manual cluster changes
    syncOptions:
      # Creates the 'monitoring' namespace automatically if it doesn't already exist
      - CreateNamespace=true
    retry:
      # Exponential backoff strategy to handle transient API errors or slow startup
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
