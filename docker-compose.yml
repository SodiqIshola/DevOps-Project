# =========================
# Node Application
# =========================
services:

  node-app:
    image: sunky24/node-task-app:latest
    container_name: node-app
    command: npm run dev
    environment:
      - NODE_ENV=development
      - TZ=America/Toronto
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318/v1/traces
      - OTEL_SERVICE_NAME=node-task-app
      - AWS_EMF_SERVICE_NAME=node-task-app
      - AWS_EMF_LOG_GROUP_NAME=node-task-app
      - AWS_EMF_SERVICE_TYPE=Backend
      - AWS_EMF_ENVIRONMENT=Local
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - ./app-logs:/app/logs
    pull_policy: always
    networks:
      - monitoring

# =========================
# Prometheus - Metrics Database
# =========================
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    volumes:
      - ./infra/prometheus/:/etc/prometheus/:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - monitoring
    restart: unless-stopped

# =========================
# Node Exporter - System Metrics
# =========================
  node-exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks: [monitoring]

# =========================
# OpenTelemetry Collector - Trace & Metrics Collection
# =========================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: otel-collector
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./infra/otel/otel-config.yaml:/etc/otel-config.yaml:ro
    ports:
      - "4318:4318"
      - "4317:4317"
      - "13133:13133"
      - "25888:25888"
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - tempo

# =========================
# Tempo - Distributed Tracing Storage
# =========================
  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    ports:
      - "3200:3200"
      - "4320:4317"
    volumes:
      - ./infra/tempo/tempo-config.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# =========================
# Jaeger - Alternative Tracing Backend
# =========================
  jaeger:
    image: jaegertracing/jaeger:2.15.1
    container_name: jaeger
    user: "0:0"
    ports:
      - "16686:16686"
      - "4333:4317"
      - "8889:8889"
    volumes:
      - ./infra/jaeger/jaeger-config.yaml:/etc/jaeger/config.yaml:ro
      - jaeger_data:/var/lib/jaeger/badger:rw
    command: ["--config", "/etc/jaeger/config.yaml"]
    restart: unless-stopped
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# =========================
# Grafana - Visualization & Dashboards
# =========================
  grafana:
    image: grafana/grafana:12.3.3
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    networks:
      - monitoring
    restart: unless-stopped

# =========================
# Loki - Log Aggregation Storage
# =========================
  loki:
    image: grafana/loki:3.6.5
    container_name: loki
    volumes:
      - loki_data:/loki
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - monitoring

# =========================
# Promtail - Log Forwarder
# =========================
  promtail:
    image: grafana/promtail:3.6.5
    container_name: promtail
    environment:
      - TZ=America/Toronto
    ports:
      - "9080:9080"
    volumes:
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - ./app-logs:/var/log/node-app:ro
      - promtail_data:/tmp/
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy

# =========================
# Networks
# =========================
networks:
  monitoring:
    driver: bridge

# =========================
# Volumes - Persistent Storage
# =========================
volumes:
  prometheus_data:
  grafana_data:
  promtail_data:
  loki_data:
  tempo_data:
  jaeger_data:
