# ---------------------------------------------------
# SECTION 1 — TEMPO SERVER
# ---------------------------------------------------
# This defines the HTTP API that Grafana uses to query Tempo.
server:
  # The port Grafana connects to for querying traces and metrics.
  http_listen_port: 3200


# ---------------------------------------------------
# SECTION 2 — DISTRIBUTOR (Trace Ingestion)
# ---------------------------------------------------
# The distributor receives traces from OpenTelemetry collectors or apps.
distributor:
  receivers:
    otlp:
      protocols:

        # gRPC OTLP receiver
        # Most OpenTelemetry SDKs send traces here by default.
        grpc:
          endpoint: "0.0.0.0:4317"

        # HTTP OTLP receiver
        # Used by browser-based telemetry or HTTP exporters.
        http:
          endpoint: "0.0.0.0:4318"


# ---------------------------------------------------
# SECTION 3 — INGESTER
# ---------------------------------------------------
# The ingester temporarily buffers traces in memory
# before writing them into permanent storage blocks.
ingester:

  # How long Tempo buffers traces before flushing to storage.
  # Shorter duration = faster visibility but more disk writes.
  max_block_duration: 5m


# ---------------------------------------------------
# SECTION 4 — STORAGE (Trace Database)
# ---------------------------------------------------
# Defines where Tempo stores trace blocks.
storage:
  trace:

    # Using local disk storage (best for Docker environments).
    backend: local

    local:
      # Directory where Tempo stores finalized trace blocks.
      path: /var/tempo/traces

    wal:
      # Write-Ahead Log ensures traces aren't lost if Tempo crashes.
      path: /var/tempo/wal

    block:
      # Modern block format required for TraceQL queries.
      version: vParquet4


# ---------------------------------------------------
# SECTION 5 — QUERY ENGINE
# ---------------------------------------------------
# Enables Tempo's search API used by Grafana Explore.
querier:
  search:
    # Empty list means Tempo handles searches internally.
    external_endpoints: []


# ---------------------------------------------------
# SECTION 6 — COMPACTOR
# ---------------------------------------------------
# The compactor cleans up old trace blocks
# and merges smaller blocks for efficiency.
compactor:
  compaction:

    # How long traces remain before deletion.
    # After this time they are permanently removed.
    block_retention: 48h


# ---------------------------------------------------
# SECTION 7 — METRICS GENERATOR
# ---------------------------------------------------
# Converts traces into Prometheus metrics.
#
# These metrics power:
#  - Grafana Service Map
#  - Request rate panels
#  - Error rate panels
#  - Latency panels
metrics_generator:

  # Metadata labels added to every generated metric.
  registry:
    external_labels:
      source: tempo

  # Storage for metrics generator write-ahead log.
  storage:
    # Directory used for metrics generator WAL
    path: /var/tempo/generator/wal

    # Where to push the calculated metrics once they are generated
    # FIXED: If 'remote_write' still fails, ensure your Tempo image is v2.0 or higher.
    remote_write:
      # The HTTP endpoint of your Prometheus-compatible database
      - url: http://prometheus:9090/api/v1/write
        # Enables linking specific metrics to traces via TraceIDs
        send_exemplars: true

  # Processors define what metrics are created from spans.
  processor:

    # Generates service-to-service dependency graphs.
    # Required for Grafana Service Map panel.
    service_graphs: {}

    # Generates RED metrics from spans:
    # Rate, Errors, Duration.
    span_metrics: {}


# ---------------------------------------------------
# SECTION 8 — GLOBAL FEATURE OVERRIDES
# ---------------------------------------------------
# Enables processors for all tenants.
overrides:
  defaults:
    metrics_generator:

      # Activates both service graph and span metric processors.
      processors:
        - service-graphs
        - span-metrics






