
global:
  scrape_interval: 15s 
  evaluation_interval: 15s 

rule_files:
  - "alerts.yml"  

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          app: "prometheus"

  - job_name: "node-app"
    static_configs:
      - targets: ["node-app:3000"]
        labels:
          app: "node-app"

  - job_name: "otel-collector-internal"
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          app: "otel-collector-internal"
          component: 'collector'
  
  - job_name: 'jaeger-monitoring'
    static_configs:
      - targets: ['jaeger:8889']
        labels:
          service_name: 'jaeger-v2'
          storage_type: 'badger'
          app: "jaeger-monitoring"

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          app: "node-exporter"

  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          app: "tempo"

