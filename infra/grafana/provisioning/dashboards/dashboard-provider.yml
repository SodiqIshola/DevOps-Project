# provisioning/dashboards/dashboard-provider.yml
# Grafana dashboard provisioning configuration
apiVersion: 1

providers:
  - name: 'Standard Dashboards'
    orgId: 1
    folder: 'Services'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10 
    options:
      path: /var/lib/grafana/dashboards

