
# --- GRAFANA DATA SOURCE PROVISIONING ---
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090  
    isDefault: true              
    uid: Prometheus
    editable: true
    jsonData:
      timeInterval: "15s"

  - name: Tempo
    type: tempo
    access: proxy
    uid: tempo                   
    url: http://tempo:3200       
    jsonData:
      nodeGraph:
        enabled: true            
      serviceMap:
        datasourceUid: 'Prometheus' 

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    uid: jaeger
    editable: false
    jsonData:
      prometheusTargetConfig:
        datasourceUid: Prometheus
      nodeGraph:
        enabled: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: Loki 
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: "View in Tempo"
          datasourceUid: tempo    
          matcherRegex: '"trace_id":"(\\w+)"' 
          url: '$${__value.raw}'
        - name: "View in Jaeger"
          datasourceUid: "jaeger"
          matcherRegex: '"trace_id":"(\\w+)"'
          url: '$${__value.raw}'



