# ==============================================================================
# JAEGER V2 CONFIGURATION (Based on OpenTelemetry Collector Architecture)
# ==============================================================================

service:
  extensions: [jaeger_storage, jaeger_query, healthcheckv2]
  
  pipelines:
    traces:
      receivers: [otlp]             
      processors: [batch]            
      exporters: [jaeger_storage_exporter] 

  telemetry:
    resource:
      service.name: jaeger          
    metrics:
      level: detailed               
      readers:
        - pull:                     
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8889          
    logs:
      level: info                   


extensions:
  
  healthcheckv2:
    use_v2: true
    http:

  jaeger_query:
    storage:
      traces: some_store            
    http:
      endpoint: 0.0.0.0:16686       
    grpc:
      endpoint: 0.0.0.0:16685       

  jaeger_storage:
    backends:
      some_store:                   
        badger:                     
          ephemeral: false          
          directories:
            keys: "/var/lib/jaeger/badger/key"    
            values: "/var/lib/jaeger/badger/data" 
          ttl:
            spans: 72h              
          metrics_update_interval: 10s 


receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317       
      http:
        endpoint: 0.0.0.0:4318       


processors:
  batch:                            

exporters:
  jaeger_storage_exporter:          
    trace_storage: some_store
